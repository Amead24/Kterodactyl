apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kterodactyl.fullname" . }}-metrics-auth-rolebinding
  labels:
    {{- include "kterodactyl.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kterodactyl.fullname" . }}-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: {{ include "kterodactyl.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
