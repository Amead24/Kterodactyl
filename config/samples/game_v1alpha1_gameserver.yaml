# Full GameServer sample with all optional fields specified.
#
# Operations via kubectl:
#   Create:     kubectl apply -f game_v1alpha1_gameserver.yaml
#   Stop:       kubectl delete gameserver my-minecraft -n default
#   Allocate:   kubectl annotate gameserver my-minecraft kterodactyl.io/allocated=true -n default
#   Deallocate: kubectl annotate gameserver my-minecraft kterodactyl.io/allocated- -n default
apiVersion: game.kterodactyl.io/v1alpha1
kind: GameServer
metadata:
  name: my-minecraft
  namespace: default
  labels:
    kterodactyl.io/owner: alice
    kterodactyl.io/game: minecraft
spec:
  gameType: minecraft
  image: itzg/minecraft-server:latest
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  ports:
    - name: game
      containerPort: 25565
      protocol: TCP
    - name: rcon
      containerPort: 25575
      protocol: TCP
  parameters:
    EULA: "TRUE"
    TYPE: "VANILLA"
    DIFFICULTY: "normal"
