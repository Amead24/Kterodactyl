apiVersion: v1
kind: ConfigMap
metadata:
  name: kterodactyl-admin-config
  namespace: kterodactyl-system
data:
  # Global limits
  maxServersGlobal: "100"
  maxServersPerUser: "5"
  # Per-user namespace quota defaults
  quotaCPURequests: "4"
  quotaCPULimits: "8"
  quotaMemoryRequests: "8Gi"
  quotaMemoryLimits: "16Gi"
  quotaPods: "5"
  quotaPVCs: "5"
  quotaStorage: "50Gi"
  # Per-container defaults (LimitRange)
  defaultCPU: "2"
  defaultMemory: "4Gi"
  defaultRequestCPU: "500m"
  defaultRequestMemory: "1Gi"
  maxCPU: "4"
  maxMemory: "8Gi"
  minCPU: "100m"
  minMemory: "128Mi"
  # Networking / DNS configuration
  # Base domain for GameServer DNS names (e.g., game.user.example.com)
  # Leave empty to disable DNS routing
  baseDomain: "example.com"
  # Name of the Gateway resource that HTTPRoutes will attach to
  gatewayName: "kterodactyl-gateway"
  # Namespace where the Gateway resource lives
  gatewayNamespace: "kterodactyl-system"
  # Namespace of the gateway controller data plane (for NetworkPolicy rules)
  gatewayControllerNamespace: "envoy-gateway-system"
