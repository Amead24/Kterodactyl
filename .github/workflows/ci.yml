name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.7.2

  unit-test:
    name: Unit Tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: make test

  integration-test:
    name: Integration Tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: make test-integration

  e2e-test:
    name: E2E Tests
    needs: [unit-test, integration-test]
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Setup kind cluster with Helm
        run: make test-e2e-setup

      - name: Run E2E tests
        run: KIND=kind KIND_CLUSTER=kterodactyl-test-e2e go test -tags=e2e ./test/e2e/ -v -ginkgo.v

      - name: Capture k8s logs
        if: failure()
        run: |
          mkdir -p /tmp/k8s-logs
          kubectl get pods -A -o wide > /tmp/k8s-logs/pods.txt 2>&1 || true
          kubectl logs -l app.kubernetes.io/name=kterodactyl \
            -n kterodactyl-system --tail=500 \
            > /tmp/k8s-logs/app-logs.txt 2>&1 || true
          kubectl describe pods -n kterodactyl-system \
            > /tmp/k8s-logs/pod-describe.txt 2>&1 || true

      - name: Upload k8s logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-k8s-logs
          path: /tmp/k8s-logs/
          retention-days: 14

      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name kterodactyl-test-e2e

  playwright:
    name: Playwright Tests
    needs: [e2e-test]
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Install Playwright browsers
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Setup kind cluster with Helm
        run: make test-e2e-setup

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test

      - name: Capture k8s logs
        if: failure()
        run: |
          mkdir -p /tmp/k8s-logs
          kubectl get pods -A -o wide > /tmp/k8s-logs/pods.txt 2>&1 || true
          kubectl logs -l app.kubernetes.io/name=kterodactyl \
            -n kterodactyl-system --tail=500 \
            > /tmp/k8s-logs/app-logs.txt 2>&1 || true
          kubectl describe pods -n kterodactyl-system \
            > /tmp/k8s-logs/pod-describe.txt 2>&1 || true

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 14

      - name: Upload k8s logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-k8s-logs
          path: /tmp/k8s-logs/
          retention-days: 14

      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name kterodactyl-test-e2e
